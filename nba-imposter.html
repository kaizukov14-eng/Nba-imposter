<style>
  :root{
    --wood-1:#1c140d;
    --wood-2:#2a1d12;
    --court-line:#e8dcc4;
    --chalk:#f3ead8;
    --ember:#d9622b;
    --ember-dim:#7a3a1c;
    --crowd:#8a7560;
    --crew:#3f6e5e;
    --imposter:#a23b2e;
    --font-display:'Rockwell','Bitstream Vera Serif',Georgia,serif;
    --font-body:'Helvetica Neue',Arial,sans-serif;
    --font-mono:'Courier New',monospace;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}

  html,body{
    margin:0; padding:0; min-height:100%;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(217,98,43,0.08), transparent 60%),
      repeating-linear-gradient(90deg, var(--wood-1) 0px, var(--wood-2) 2px, var(--wood-1) 38px, var(--wood-2) 40px),
      var(--wood-1);
    color:var(--chalk);
    font-family:var(--font-body);
    overscroll-behavior:none;
  }

  #app{
    min-height:100vh;
    display:flex; flex-direction:column;
    align-items:center;
    padding:env(safe-area-inset-top,0) 0 calc(env(safe-area-inset-bottom,0) + 16px) 0;
  }

  .screen{
    width:100%; max-width:480px;
    min-height:100vh;
    display:flex; flex-direction:column;
    padding:28px 22px 20px;
    animation:fadeIn .35s ease;
  }

  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  @media (prefers-reduced-motion: reduce){ .screen{animation:none;} }

  /* ---------- Header / Branding ---------- */
  .brand{
    display:flex; align-items:baseline; justify-content:space-between;
    border-bottom:2px solid var(--ember-dim);
    padding-bottom:10px; margin-bottom:24px;
  }
  .brand h1{
    font-family:var(--font-display);
    font-size:22px; letter-spacing:0.5px; margin:0;
    color:var(--chalk);
  }
  .brand h1 span{color:var(--ember);}
  .brand .tag{
    font-family:var(--font-mono); font-size:11px; color:var(--crowd);
    text-transform:uppercase; letter-spacing:1px;
  }

  /* ---------- Generic buttons ---------- */
  button{
    font-family:var(--font-body); border:none; cursor:pointer;
    -webkit-appearance:none;
  }
  .btn-primary{
    background:var(--ember); color:#1c140d; font-weight:700;
    font-size:17px; padding:16px 20px; border-radius:3px;
    letter-spacing:0.3px;
    box-shadow:0 4px 0 var(--ember-dim);
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .btn-primary:active{ transform:translateY(3px); box-shadow:0 1px 0 var(--ember-dim); }
  .btn-primary:disabled{ opacity:.35; box-shadow:none; }

  .btn-secondary{
    background:transparent; color:var(--court-line);
    border:1.5px solid var(--crowd); font-size:15px;
    padding:13px 18px; border-radius:3px;
  }
  .btn-secondary:active{ background:rgba(255,255,255,0.05); }

  .btn-ghost{
    background:none; color:var(--crowd); font-size:14px;
    text-decoration:underline; padding:8px;
  }

  /* ---------- Setup screen ---------- */
  .field-label{
    font-family:var(--font-mono); font-size:12px; text-transform:uppercase;
    letter-spacing:1px; color:var(--crowd); margin:0 0 8px;
  }
  .stepper{
    display:flex; align-items:center; gap:18px; margin-bottom:28px;
  }
  .stepper button{
    width:46px; height:46px; border-radius:50%;
    background:var(--wood-2); border:1.5px solid var(--ember-dim);
    color:var(--ember); font-size:22px; font-weight:700;
  }
  .stepper .count{
    font-family:var(--font-display); font-size:34px; min-width:50px; text-align:center;
  }

  .player-names{
    display:flex; flex-direction:column; gap:10px; margin-bottom:24px;
  }
  .player-names input{
    background:var(--wood-2); border:1px solid var(--ember-dim);
    color:var(--chalk); font-size:16px; padding:13px 14px; border-radius:3px;
    font-family:var(--font-body);
  }
  .player-names input::placeholder{ color:#6b5b48; }
  .player-names input:focus{ outline:none; border-color:var(--ember); }

  .category-grid{
    display:flex; flex-wrap:wrap; gap:8px; margin-bottom:24px;
  }
  .chip{
    padding:9px 14px; border-radius:20px; font-size:13px;
    border:1.5px solid var(--crowd); color:var(--court-line);
    background:transparent;
  }
  .chip.active{ background:var(--ember); border-color:var(--ember); color:#1c140d; font-weight:700; }

  .imposter-count-row{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:30px; padding:14px 16px; background:rgba(0,0,0,0.2);
    border-radius:6px; border:1px solid var(--ember-dim);
  }
  .mini-stepper{ display:flex; align-items:center; gap:14px; }
  .mini-stepper button{
    width:32px; height:32px; border-radius:50%; background:var(--wood-2);
    border:1px solid var(--ember-dim); color:var(--ember); font-size:16px; font-weight:700;
  }
  .mini-stepper .n{ font-size:20px; font-weight:700; min-width:20px; text-align:center; }

  .spacer{ flex:1; }

  .error-text{ color:var(--ember); font-size:13px; margin-top:-14px; margin-bottom:18px; }

  /* ---------- Pass-the-phone reveal ---------- */
  .reveal-stage{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
  }
  .player-turn-label{
    font-family:var(--font-mono); font-size:13px; color:var(--crowd);
    text-transform:uppercase; letter-spacing:2px; margin-bottom:6px;
  }
  .player-turn-name{
    font-family:var(--font-display); font-size:30px; margin:0 0 40px;
  }

  .card{
    width:240px; height:300px; perspective:1000px; margin-bottom:36px;
  }
  .card-inner{
    width:100%; height:100%; position:relative;
    transform-style:preserve-3d; transition:transform .55s cubic-bezier(.4,.1,.2,1);
    border-radius:14px;
  }
  .card.flipped .card-inner{ transform:rotateY(180deg); }
  .card-face{
    position:absolute; width:100%; height:100%; backface-visibility:hidden;
    border-radius:14px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:20px;
  }
  .card-front{
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.025) 0 2px, transparent 2px 14px),
      linear-gradient(160deg, var(--wood-2), var(--wood-1));
    border:2px solid var(--ember-dim);
  }
  .card-front .ball{
    font-size:54px; opacity:.85;
  }
  .card-front .tap-hint{
    font-family:var(--font-mono); font-size:12px; color:var(--crowd);
    margin-top:18px; text-transform:uppercase; letter-spacing:1px;
  }
  .card-back{
    background:linear-gradient(160deg, #241a12, #150f0a);
    border:2px solid var(--ember);
    transform:rotateY(180deg);
  }
  .card-back .role-tag{
    font-family:var(--font-mono); font-size:11px; text-transform:uppercase;
    letter-spacing:2px; padding:4px 10px; border-radius:10px; margin-bottom:14px;
  }
  .role-tag.crew{ background:rgba(63,110,94,0.25); color:#8fd9bd; border:1px solid var(--crew); }
  .role-tag.imp{ background:rgba(162,59,46,0.25); color:#ef9c8c; border:1px solid var(--imposter); }
  .card-back .reveal-name{
    font-family:var(--font-display); font-size:26px; text-align:center; line-height:1.25;
    margin:0 0 8px;
  }
  .card-back .reveal-sub{
    font-size:12.5px; color:var(--crowd); text-align:center; line-height:1.5; padding:0 6px;
  }

  .progress-dots{ display:flex; gap:6px; margin-bottom:18px; }
  .progress-dots .dot{ width:7px; height:7px; border-radius:50%; background:var(--wood-2); border:1px solid var(--ember-dim); }
  .progress-dots .dot.done{ background:var(--ember); border-color:var(--ember); }

  /* ---------- Game in progress ---------- */
  .ip-stage{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  .ip-stage .icon{ font-size:48px; margin-bottom:20px; }
  .ip-stage h2{ font-family:var(--font-display); font-size:24px; margin:0 0 14px; }
  .ip-stage p{ color:var(--crowd); font-size:14.5px; line-height:1.6; max-width:340px; margin:0 0 30px; }
  .order-list{
    background:rgba(0,0,0,0.2); border:1px solid var(--ember-dim); border-radius:8px;
    padding:16px; width:100%; max-width:320px; margin-bottom:30px; text-align:left;
  }
  .order-list div{ font-size:14px; padding:6px 0; color:var(--court-line); }
  .order-list div b{ color:var(--ember); font-family:var(--font-mono); margin-right:8px; }

  /* ---------- Vote screen ---------- */
  .vote-list{ display:flex; flex-direction:column; gap:10px; margin-bottom:24px; }
  .vote-option{
    display:flex; align-items:center; justify-content:space-between;
    padding:15px 16px; border-radius:6px; border:1.5px solid var(--crowd);
    background:rgba(0,0,0,0.15); font-size:16px;
  }
  .vote-option.selected{ border-color:var(--ember); background:rgba(217,98,43,0.12); }
  .vote-option .vname{ font-weight:600; }
  .vote-option .check{ color:var(--ember); font-size:18px; opacity:0; }
  .vote-option.selected .check{ opacity:1; }

  /* ---------- Results ---------- */
  .result-banner{
    text-align:center; padding:26px 18px; border-radius:8px; margin-bottom:24px;
  }
  .result-banner.win{ background:rgba(63,110,94,0.18); border:1.5px solid var(--crew); }
  .result-banner.lose{ background:rgba(162,59,46,0.18); border:1.5px solid var(--imposter); }
  .result-banner .headline{ font-family:var(--font-display); font-size:24px; margin:0 0 6px; }
  .result-banner .sub{ font-size:14px; color:var(--court-line); }

  .reveal-card-final{
    display:flex; align-items:center; gap:14px; background:rgba(0,0,0,0.2);
    border:1px solid var(--ember-dim); border-radius:8px; padding:16px; margin-bottom:14px;
  }
  .reveal-card-final .label{ font-family:var(--font-mono); font-size:11px; color:var(--crowd); text-transform:uppercase; letter-spacing:1px; }
  .reveal-card-final .val{ font-family:var(--font-display); font-size:19px; }

  /* misc */
  .top-link{ align-self:flex-start; margin-bottom:10px; }
  .footer-note{ text-align:center; font-size:11.5px; color:#5c4d3c; margin-top:auto; padding-top:18px; }
</style>

  brandHeader(container, "NBA Imposter Setup");

  const label1 = document.createElement('p');
  label1.className = 'field-label';
  label1.textContent = 'Anzahl Spieler';
  container.appendChild(label1);

  const stepper = document.createElement('div');
  stepper.className = 'stepper';
  const minus = document.createElement('button');
  minus.textContent = '–';
  minus.onclick = () => { if(state.playerCount > 3){ state.playerCount--; state.names.pop(); render(); } };
  const count = document.createElement('div');
  count.className = 'count';
  count.textContent = state.playerCount;
  const plus = document.createElement('button');
  plus.textContent = '+';
  plus.onclick = () => { if(state.playerCount < 12){ state.playerCount++; state.names.push(""); render(); } };
  stepper.appendChild(minus); stepper.appendChild(count); stepper.appendChild(plus);
  container.appendChild(stepper);

  const label2 = document.createElement('p');
  label2.className = 'field-label';
  label2.textContent = 'Namen (optional, sonst "Spieler 1, 2, ...")';
  container.appendChild(label2);

  const namesWrap = document.createElement('div');
  namesWrap.className = 'player-names';
  for(let i=0; i<state.playerCount; i++){
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.placeholder = `Spieler ${i+1}`;
    inp.value = state.names[i] || "";
    inp.maxLength = 16;
    inp.oninput = (e) => { state.names[i] = e.target.value; };
    namesWrap.appendChild(inp);
  }
  container.appendChild(namesWrap);

  const label3 = document.createElement('p');
  label3.className = 'field-label';
  label3.textContent = 'Zeitraum (mehrfach wählbar)';
  container.appendChild(label3);

  const eraGrid = document.createElement('div');
  eraGrid.className = 'category-grid';
  [
    {key:"aktuell", label:"Aktuell"},
    {key:"alltime", label:"Allzeit / Legenden"}
  ].forEach(opt => {
    const chip = document.createElement('button');
    const active = state.selectedEras.includes(opt.key);
    chip.className = 'chip' + (active ? ' active' : '');
    chip.textContent = opt.label;
    chip.onclick = () => {
      if(active){
        if(state.selectedEras.length > 1) state.selectedEras = state.selectedEras.filter(e => e !== opt.key);
      } else {
        state.selectedEras = [...state.selectedEras, opt.key];
      }
      render();
    };
    eraGrid.appendChild(chip);
  });
  container.appendChild(eraGrid);

  const label3b = document.createElement('p');
  label3b.className = 'field-label';
  label3b.textContent = 'Bekanntheit (mehrfach wählbar)';
  container.appendChild(label3b);

  const fameGrid = document.createElement('div');
  fameGrid.className = 'category-grid';
  [
    {key:"star", label:"Bekannte Stars"},
    {key:"rolle", label:"Weniger bekannt"}
  ].forEach(opt => {
    const chip = document.createElement('button');
    const active = state.selectedFames.includes(opt.key);
    chip.className = 'chip' + (active ? ' active' : '');
    chip.textContent = opt.label;
    chip.onclick = () => {
      if(active){
        if(state.selectedFames.length > 1) state.selectedFames = state.selectedFames.filter(f => f !== opt.key);
      } else {
        state.selectedFames = [...state.selectedFames, opt.key];
      }
      render();
    };
    fameGrid.appendChild(chip);
  });
  container.appendChild(fameGrid);

  const pool = filterPlayers(state.selectedEras, state.selectedFames);
  const poolInfo = document.createElement('p');
  poolInfo.style.fontSize = '12.5px';
  poolInfo.style.color = 'var(--crowd)';
  poolInfo.style.marginTop = '-14px';
  poolInfo.style.marginBottom = '22px';
  poolInfo.textContent = `${pool.length} Spieler im Pool — Mix aus allen Kategorien möglich, einfach mehrere Chips anwählen.`;
  container.appendChild(poolInfo);

  const impRow = document.createElement('div');
  impRow.className = 'imposter-count-row';
  const impLabelWrap = document.createElement('div');
  impLabelWrap.innerHTML = `<div style="font-size:14px;font-weight:600;">Imposter</div><div style="font-size:12px;color:var(--crowd);">verstecken sich unter den Crew-Spielern</div>`;
  const miniStep = document.createElement('div');
  miniStep.className = 'mini-stepper';
  const mMinus = document.createElement('button');
  mMinus.textContent = '–';
  mMinus.onclick = () => { if(state.imposterCount > 1){ state.imposterCount--; render(); } };
  const mN = document.createElement('div');
  mN.className = 'n';
  mN.textContent = state.imposterCount;
  const mPlus = document.createElement('button');
  mPlus.textContent = '+';
  mPlus.onclick = () => { if(state.imposterCount < Math.floor(state.playerCount/2)){ state.imposterCount++; render(); } };
  miniStep.appendChild(mMinus); miniStep.appendChild(mN); miniStep.appendChild(mPlus);
  impRow.appendChild(impLabelWrap); impRow.appendChild(miniStep);
  container.appendChild(impRow);

  const label4 = document.createElement('p');
  label4.className = 'field-label';
  label4.textContent = 'Imposter-Modus';
  container.appendChild(label4);
  const modeGrid = document.createElement('div');
  modeGrid.className = 'category-grid';
  modeGrid.style.marginBottom = '24px';
  [
    {key:"blind", label:"Kennt keinen Spieler"},
    {key:"decoy", label:"Bekommt anderen Spieler"}
  ].forEach(m => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (state.imposterMode === m.key ? ' active' : '');
    chip.textContent = m.label;
    chip.onclick = () => { state.imposterMode = m.key; render(); };
    modeGrid.appendChild(chip);
  });
  container.appendChild(modeGrid);

  container.appendChild(document.createElement('div')).className = 'spacer';

  const startBtn = document.createElement('button');
  startBtn.className = 'btn-primary';
  startBtn.textContent = 'Runde starten';
  startBtn.onclick = startGame;
  container.appendChild(startBtn);

  const footer = document.createElement('div');
  footer.className = 'footer-note';
  footer.textContent = 'Gerät rumgeben, jeder schaut nur seine eigene Karte an.';
  container.appendChild(footer);
}

function getFinalNames(){
  return Array.from({length: state.playerCount}, (_, i) => state.names[i]?.trim() || `Spieler ${i+1}`);
}

function startGame(){
  state.names = getFinalNames();

  // choose player + decoy from filtered pool
  const pool = filterPlayers(state.selectedEras, state.selectedFames);
  const chosenIdx = Math.floor(Math.random() * pool.length);
  state.chosenPlayer = pool[chosenIdx].name;
  if(state.imposterMode === "decoy"){
    let decoyIdx;
    do { decoyIdx = Math.floor(Math.random() * pool.length); } while(decoyIdx === chosenIdx && pool.length > 1);
    state.decoyPlayer = pool[decoyIdx].name;
  } else {
    state.decoyPlayer = null;
  }

  // assign roles
  const indices = state.names.map((_, i) => i);
  shuffle(indices);
  const imposterIdxSet = new Set(indices.slice(0, state.imposterCount));
  state.roles = state.names.map((_, i) => imposterIdxSet.has(i) ? "imposter" : "crew");

  // random reveal order (also doubles as turn-speaking order)
  state.startOrder = shuffle([...indices]);

  state.revealIndex = 0;
  state.cardFlipped = false;
  state.screen = "reveal";
  render();
}

function shuffle(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ---------------- REVEAL (pass the phone) ---------------- */
function renderReveal(container){
  brandHeader(container, `Karte ${state.revealIndex+1} von ${state.playerCount}`);

  const dots = document.createElement('div');
  dots.className = 'progress-dots';
  for(let i=0;i<state.playerCount;i++){
    const d = document.createElement('div');
    d.className = 'dot' + (i < state.revealIndex ? ' done' : '');
    dots.appendChild(d);
  }
  container.appendChild(dots);

  const stage = document.createElement('div');
  stage.className = 'reveal-stage';

  const personIdx = state.startOrder[state.revealIndex];
  const personName = state.names[personIdx];
  const role = state.roles[personIdx];

  const turnLabel = document.createElement('div');
  turnLabel.className = 'player-turn-label';
  turnLabel.textContent = 'Gerät geben an';
  stage.appendChild(turnLabel);

  const turnName = document.createElement('h2');
  turnName.className = 'player-turn-name';
  turnName.textContent = personName;
  stage.appendChild(turnName);

  const card = document.createElement('div');
  card.className = 'card' + (state.cardFlipped ? ' flipped' : '');
  const cardInner = document.createElement('div');
  cardInner.className = 'card-inner';

  const front = document.createElement('div');
  front.className = 'card-face card-front';
  front.innerHTML = `<div class="ball">🏀</div><div class="tap-hint">Tippen zum Aufdecken</div>`;

  const back = document.createElement('div');
  back.className = 'card-face card-back';
  if(role === 'crew'){
    back.innerHTML = `
      <div class="role-tag crew">Crew</div>
      <p class="reveal-name">${state.chosenPlayer}</p>
      <p class="reveal-sub">Das ist dein Spieler. Gib gleich einen Hinweis, ohne den Namen zu sagen.</p>`;
  } else {
    if(state.imposterMode === 'decoy'){
      back.innerHTML = `
        <div class="role-tag imp">Imposter</div>
        <p class="reveal-name">${state.decoyPlayer}</p>
        <p class="reveal-sub">Achtung: Die anderen haben einen anderen Spieler! Bluffe mit.</p>`;
    } else {
      back.innerHTML = `
        <div class="role-tag imp">Imposter</div>
        <p class="reveal-name">??? </p>
        <p class="reveal-sub">Du kennst den Spieler nicht. Hör gut zu und bluffe mit, ohne aufzufliegen.</p>`;
    }
  }

  cardInner.appendChild(front);
  cardInner.appendChild(back);
  card.appendChild(cardInner);
  card.onclick = () => {
    if(!state.cardFlipped){
      state.cardFlipped = true;
      render();
    }
  };
  stage.appendChild(card);

  const nextBtn = document.createElement('button');
  nextBtn.className = 'btn-primary';
  nextBtn.style.width = '100%';
  nextBtn.textContent = state.revealIndex === state.playerCount - 1 ? 'Weiter zur Runde' : 'Nächster Spieler';
  nextBtn.disabled = !state.cardFlipped;
  nextBtn.onclick = () => {
    if(!state.cardFlipped) return;
    if(state.revealIndex === state.playerCount - 1){
      state.screen = "inprogress";
    } else {
      state.revealIndex++;
      state.cardFlipped = false;
    }
    render();
  };
  stage.appendChild(nextBtn);

  container.appendChild(stage);
}

/* ---------------- IN PROGRESS (speaking order) ---------------- */
function renderInProgress(container){
  brandHeader(container, "Runde läuft");
  const stage = document.createElement('div');
  stage.className = 'ip-stage';
  stage.innerHTML = `<div class="icon">🗣️</div>
    <h2>Jetzt wird gesprochen</h2>
    <p>In dieser Reihenfolge nennt jeder einen Hinweis zu seinem Spieler — ohne den Namen zu sagen. Wer keinen Spieler hat, bluffed mit.</p>`;

  const orderList = document.createElement('div');
  orderList.className = 'order-list';
  state.startOrder.forEach((idx, i) => {
    const row = document.createElement('div');
    row.innerHTML = `<b>${i+1}.</b> ${state.names[idx]}`;
    orderList.appendChild(row);
  });
  stage.appendChild(orderList);

  const voteBtn = document.createElement('button');
  voteBtn.className = 'btn-primary';
  voteBtn.style.width = '100%';
  voteBtn.textContent = 'Alle fertig — Auflösung zeigen';
  voteBtn.onclick = () => {
    state.screen = "results";
    render();
  };
  stage.appendChild(voteBtn);
  container.appendChild(stage);
}

/* ---------------- RESULTS ---------------- */
function renderResults(container){
  brandHeader(container, "Auflösung");

  const imposterIndices = state.roles.map((r,i) => r === 'imposter' ? i : -1).filter(i => i !== -1);
  const isMultiple = imposterIndices.length > 1;

  const banner = document.createElement('div');
  banner.className = 'result-banner win';
  banner.innerHTML = `<p class="headline">Aufgedeckt 🔎</p><p class="sub">Jetzt diskutieren, wer's geahnt hat.</p>`;
  container.appendChild(banner);

  const playerCard = document.createElement('div');
  playerCard.className = 'reveal-card-final';
  playerCard.innerHTML = `<div><div class="label">Der Spieler war</div><div class="val">${state.chosenPlayer}</div></div>`;
  container.appendChild(playerCard);

  if(state.imposterMode === 'decoy' && state.decoyPlayer){
    const decoyCard = document.createElement('div');
    decoyCard.className = 'reveal-card-final';
    decoyCard.innerHTML = `<div><div class="label">Imposter-Spieler war</div><div class="val">${state.decoyPlayer}</div></div>`;
    container.appendChild(decoyCard);
  }

  const impCard = document.createElement('div');
  impCard.className = 'reveal-card-final';
  impCard.style.marginBottom = '24px';
  impCard.innerHTML = `<div><div class="label">${isMultiple ? 'Imposter (alle)' : 'Imposter'}</div><div class="val">${imposterIndices.map(i => state.names[i]).join(', ')}</div></div>`;
  container.appendChild(impCard);

  container.appendChild(document.createElement('div')).className = 'spacer';

  const againBtn = document.createElement('button');
  againBtn.className = 'btn-primary';
  againBtn.style.width = '100%';
  againBtn.style.marginBottom = '10px';
  againBtn.textContent = 'Nochmal spielen (gleiche Spieler)';
  againBtn.onclick = () => {
    startGame();
  };
  container.appendChild(againBtn);

  const newSetupBtn = document.createElement('button');
  newSetupBtn.className = 'btn-secondary';
  newSetupBtn.style.width = '100%';
  newSetupBtn.textContent = 'Neue Runde einrichten';
  newSetupBtn.onclick = () => {
    state.screen = "setup";
    render();
  };
  container.appendChild(newSetupBtn);
}

render();
})();
</script>
</body>
</html>
